<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Contribution Sankey - Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 12px;
      padding: 40px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      font-size: 2.5em;
      color: #2c3e50;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.1em;
      color: #7f8c8d;
      margin-bottom: 20px;
    }

    .control-panel {
      display: flex;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .control-panel label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      color: #34495e;
    }

    .control-panel input,
    .control-panel select,
    .control-panel button {
      padding: 10px 15px;
      border: 2px solid #ecf0f1;
      border-radius: 6px;
      font-size: 1em;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .control-panel input:focus,
    .control-panel select:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .control-panel input {
      min-width: 200px;
    }

    .control-panel select {
      min-width: 150px;
    }

    .control-panel button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      font-weight: 600;
      cursor: pointer;
      padding: 10px 30px;
    }

    .control-panel button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .control-panel button:active {
      transform: translateY(0);
    }

    .visualization-container {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      min-height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #sankey-visualization {
      width: 100%;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: #7f8c8d;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ecf0f1;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .info-box {
      background: #ecf0f1;
      border-left: 4px solid #667eea;
      padding: 15px 20px;
      border-radius: 4px;
      margin-top: 20px;
      font-size: 0.95em;
      color: #34495e;
    }

    .info-box.success {
      background: #d5f4e6;
      border-left-color: #27ae60;
      color: #27ae60;
    }

    .info-box.error {
      background: #fadbd8;
      border-left-color: #e74c3c;
      color: #c0392b;
    }

    .footer {
      text-align: center;
      color: white;
      margin-top: 40px;
      padding: 20px;
      font-size: 0.9em;
    }

    .footer a {
      color: #ecf0f1;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease;
    }

    .footer a:hover {
      border-bottom-color: white;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .stat-card {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .stat-card label {
      font-size: 0.85em;
      color: #7f8c8d;
      display: block;
      margin-bottom: 5px;
    }

    .stat-card value {
      font-size: 1.5em;
      font-weight: bold;
      color: #2c3e50;
    }

    @media (max-width: 768px) {
      .header {
        padding: 25px;
      }

      .header h1 {
        font-size: 1.8em;
      }

      .control-panel {
        flex-direction: column;
        align-items: stretch;
      }

      .control-panel input,
      .control-panel select,
      .control-panel button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 GitHub Contribution Sankey</h1>
      <p>Interactive visualization of your GitHub contributions</p>

      <div class="control-panel">
        <label for="username-input">
          Username:
          <input
            type="text"
            id="username-input"
            placeholder="e.g., octocat"
            value="octocat"
          >
        </label>

        <label for="org-input">
          Organization:
          <input
            type="text"
            id="org-input"
            placeholder="e.g., github"
            value="github"
          >
        </label>

        <label for="theme-select">
          Theme:
          <select id="theme-select">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </label>

        <button id="load-btn">Load Visualization</button>
      </div>

      <div id="message-container"></div>
    </div>

    <div class="visualization-container">
      <div id="sankey-visualization" class="loading">
        <div class="spinner"></div>
        <p>Enter a GitHub username and click "Load Visualization" to get started</p>
      </div>
    </div>

    <div class="footer">
      <p>
        GitHub Contribution Sankey © 2024 |
        <a href="https://github.com/ModelEarth/webroot" target="_blank">View on GitHub</a> |
        <a href="https://modelearth.org" target="_blank">ModelEarth</a>
      </p>
    </div>
  </div>

  <script src="./dist/github-contribution-sankey.min.js"></script>
  <script>
    let currentSankey = null;

    function showMessage(message, type = 'info') {
      const container = document.getElementById('message-container');
      container.innerHTML = `<div class="info-box ${type}">${message}</div>`;
      setTimeout(() => {
        container.innerHTML = '';
      }, 5000);
    }

    async function loadVisualization() {
      const username = document.getElementById('username-input').value.trim();
      const organization = document.getElementById('org-input').value.trim();
      const theme = document.getElementById('theme-select').value;

      if (!username) {
        showMessage('⚠️ Please enter a GitHub username', 'error');
        return;
      }

      const vizContainer = document.getElementById('sankey-visualization');
      vizContainer.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading data...</p></div>';

      try {
        // Create new Sankey instance
        currentSankey = new GitHubContributionSankey({
          username,
          container: vizContainer,
          organization: organization || 'ModelEarth',
          theme,
          onLoad: () => {
            showMessage(`✅ Successfully loaded ${username}'s contributions!`, 'success');
          },
          onError: (error) => {
            showMessage(`❌ Error: ${error.message}`, 'error');
          }
        });

        await currentSankey.render();

      } catch (error) {
        vizContainer.innerHTML = `<div class="info-box error"><strong>Error:</strong> ${error.message}</div>`;
        showMessage(`❌ Failed to load visualization: ${error.message}`, 'error');
      }
    }

    // Event listeners
    document.getElementById('load-btn').addEventListener('click', loadVisualization);

    document.getElementById('username-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        loadVisualization();
      }
    });

    document.getElementById('theme-select').addEventListener('change', async () => {
      if (currentSankey) {
        await loadVisualization();
      }
    });

    // Load initial user on page load
    window.addEventListener('load', () => {
      // Uncomment to auto-load on page load
      // loadVisualization();
    });
  </script>
</body>
</html>
